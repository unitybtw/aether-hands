<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #hud-container {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 25px 45px;
            border-radius: 28px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(30px) scale(0.8);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.6),
                inset 0 0 20px rgba(0, 229, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        #hud-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        #hud-container.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .icon {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .label {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00e5ff;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }
        .glow-ring {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 28px;
            border: 2px solid #00e5ff;
            opacity: 0;
            pointer-events: none;
        }
        .show .glow-ring {
            animation: ring-pulse 1.5s ease-out forwards;
        }
        @keyframes ring-pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px var(--accent-primary);
            animation: scan 2s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
    </style>
</head>
<body>
    <div id="hud-container">
        <div class="scanline"></div>
        <div class="glow-ring"></div>
        <div id="hud-content" style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
            <div class="icon" id="hud-icon">⚡</div>
            <div class="label" id="hud-label">Init</div>
        </div>
    </div>

    <script>
        const hud = document.getElementById('hud-container');
        const icon = document.getElementById('hud-icon');
        const label = document.getElementById('hud-label');
        let hideTimeout;

        const GESTURE_ASSETS = {
            'PLAY_PAUSE': { icon: '⏯️', label: 'Play / Pause' },
            'NEXT_TRACK': { icon: '⏭️', label: 'Next Track' },
            'PREV_TRACK': { icon: '⏮️', label: 'Previous Track' },
            'MUTE_TOGGLE': { icon: '🔇', label: 'Mute' },
            'VOLUME_UP': { icon: '🔊', label: 'Volume Up' },
            'VOLUME_DOWN': { icon: '🔉', label: 'Volume Down' },
            'MISSION_CONTROL': { icon: '🖥️', label: 'Mission Control' },
            'LAUNCHPAD': { icon: '🚀', label: 'Launchpad' },
            'SHOW_DESKTOP': { icon: '🖼️', label: 'Show Desktop' },
            'SPACES': { icon: '↔️', label: 'Switch Space' },
            'SPACE_LEFT': { icon: '⬅️', label: 'Space Left' },
            'SPACE_RIGHT': { icon: '➡️', label: 'Space Right' },
            'BRIGHTNESS_UP': { icon: '☀️', label: 'Brightness Up' },
            'BRIGHTNESS_DOWN': { icon: '🔅', label: 'Brightness Down' },
            'LOCK_SCREEN': { icon: '🔒', label: 'Locked' },
            'MIC_MUTE': { icon: '🎙️', label: 'Mic Toggle' },
            'LAUNCH_SAFARI': { icon: '🌐', label: 'Safari' },
            'LAUNCH_CHROME': { icon: '🌍', label: 'Chrome' },
            'LAUNCH_SPOTIFY': { icon: '🎵', label: 'Spotify' },
            'LAUNCH_VSCODE': { icon: '💻', label: 'VS Code' },
            'LAUNCH_TERMINAL': { icon: '⌨️', label: 'Terminal' },
            'BROWSER_BACK': { icon: '⏪', label: 'Back' },
            'BROWSER_FORWARD': { icon: '⏩', label: 'Forward' },
            'BROWSER_TAB_NEXT': { icon: '➡️', label: 'Next Tab' },
            'BROWSER_TAB_PREV': { icon: '⬅️', label: 'Prev Tab' },
            'LASER_POINTER': { icon: '✨', label: 'Air Draw' }
        };

        window.electronAPI.onShowHud((action, subtitle) => {
            const asset = GESTURE_ASSETS[action] || { icon: '⚡', label: action.replace('_', ' ') };
            icon.innerText = asset.icon;
            
            if (subtitle) {
                const maxLen = 35;
                const trunc = (subtitle.length > maxLen) ? subtitle.substring(0, maxLen - 3) + '...' : subtitle;
                label.innerHTML = `<span style="display:block; margin-bottom:4px;">${asset.label}</span><span style="font-size: 0.8em; color: rgba(255,255,255,0.7); font-weight: 400; text-transform: none; letter-spacing: 0px;">${trunc}</span>`;
            } else {
                label.innerHTML = asset.label;
            }

            hud.classList.remove('show');
            void hud.offsetWidth; 
            hud.classList.add('show');
            
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                hud.classList.remove('show');
                setTimeout(() => window.electronAPI.hideHud(), 500);
            }, 1200);
        });
    </script>
</body>
</html>
