<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #hud-container {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 50px;
            border-radius: 24px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #hud-container.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
        }
        .label {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #00e5ff;
        }
    </style>
</head>
<body>
    <div id="hud-container">
        <div class="icon" id="hud-icon">🤏</div>
        <div class="label" id="hud-label">Action</div>
    </div>

    <script>
        const hud = document.getElementById('hud-container');
        const icon = document.getElementById('hud-icon');
        const label = document.getElementById('hud-label');
        let hideTimeout;

        const GESTURE_ASSETS = {
            'PLAY_PAUSE': { icon: '⏯️', label: 'Play / Pause' },
            'MUTE_TOGGLE': { icon: '🔇', label: 'System Mute' },
            'MISSION_CONTROL': { icon: '🖥️', label: 'Mission Control' },
            'SPACES': { icon: '↔️', label: 'Switch Space' },
            'BRIGHTNESS_UP': { icon: '☀️', label: 'Brightness Up' },
            'BRIGHTNESS_DOWN': { icon: '🔅', label: 'Brightness Down' },
            'LOCK_SCREEN': { icon: '🔒', label: 'Screen Locked' },
            'MIC_MUTE': { icon: '🎙️', label: 'Mic Toggle' },
            'LAUNCH_SAFARI': { icon: '🌐', label: 'Safari' },
            'LAUNCH_SPOTIFY': { icon: '🎵', label: 'Spotify' }
        };

        window.electronAPI.onShowHud((action) => {
            const asset = GESTURE_ASSETS[action] || { icon: '✨', label: action };
            icon.innerText = asset.icon;
            label.innerText = asset.label;

            hud.classList.add('show');
            
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                hud.classList.remove('show');
            }, 1500);
        });
    </script>
</body>
</html>
