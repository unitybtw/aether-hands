<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aether Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --accent-primary: #00e5ff;
            --accent-secondary: #7000ff;
            --panel-bg: rgba(20, 20, 25, 0.7);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 229, 255, 0.2);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 25px;
            padding-top: 60px;
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: 1fr;
            gap: 25px;
            height: 100vh;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }
        .panel {
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            transition: border-color 0.3s ease;
            height: 100%;
            box-sizing: border-box;
            min-height: 0; /* Important for flex/grid children */
        }
        .panel:hover {
            border-color: var(--border-glow);
        }
        h2 {
            margin-top: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2::before {
            content: '';
            width: 4px;
            height: 16px;
            background: var(--accent-primary);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--accent-primary);
        }
        .feed-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.8;
        }
        #status-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #00ff00;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 255, 0, 0.2);
        }
        #status-overlay::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff00;
            animation: pulse-simple 2s infinite;
        }
        @keyframes pulse-simple {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .log-area {
            margin-top: 20px;
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 14px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .log-area::-webkit-scrollbar {
            width: 4px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        /* Settings Styles */
        .setting-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            background: rgba(15, 15, 20, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        select:hover {
            border-color: var(--accent-primary);
            background: rgba(15, 15, 20, 0.9) !important;
        }
        .gesture-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s;
        }
        .gesture-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .gesture-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 400;
            font-size: 0.95rem;
        }
        .gesture-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-primary);
            transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type="checkbox"] {
            accent-color: var(--accent-primary);
            width: 16px;
            height: 16px;
            margin-right: 10px;
        }
        .right-content {
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
            padding-right: 15px; /* More padding for scrollbar */
            height: 100%;
        }
        .right-content::-webkit-scrollbar {
            width: 6px;
        }
        .right-content::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 10px;
        }
        .right-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        /* Theme Overrides */
        body.theme-minimal {
            --bg-color: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #6366f1;
            background-image: none;
        }
        body.theme-minimal .panel { border-color: rgba(0,0,0,0.05); }
        body.theme-minimal .log-area { background: rgba(0,0,0,0.05); color: #1e293b; }
        body.theme-minimal select { background: #fff !important; color: #1e293b; border-color: #e2e8f0; }
        
        body.theme-emerald {
            --bg-color: #061109;
            --accent-primary: #10b981;
            --accent-secondary: #059669;
            --panel-bg: rgba(10, 20, 15, 0.8);
            --border-glow: rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    
    <!-- Left Panel: Camera & Status -->
    <div class="panel">
        <h2>Aether Engine</h2>
        <div class="feed-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="vfx-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
            <div id="status-overlay">Initializing Tracker...</div>
            <div id="gesture-feedback" style="position: absolute; top: 10px; left: 10px; background: rgba(0, 229, 255, 0.1); padding: 6px 16px; border-radius: 20px; font-weight: 600; color: var(--accent-primary); opacity: 0; transition: all 0.3s; border: 1px solid var(--accent-primary); backdrop-filter: blur(10px); font-size: 0.9rem;">
                ACTIVE: <span id="last-gesture">-</span>
            </div>
            <div id="status-activation" style="position: absolute; bottom: 12px; left: 12px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 12px; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);">
                <div id="activation-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; box-shadow: 0 0 10px #4CAF50;"></div>
                <span id="activation-text" style="color: #fff; opacity: 0.8;">Tracking Live</span>
            </div>
        </div>
        <div class="log-area" id="log">
            Awaiting gestures...
        </div>
    </div>

    <!-- Right Panel: Configurations -->
    <div class="panel right-content">
        <h2>Command Mappings</h2>
        
        <div class="gesture-row">
            <div class="gesture-label"><span class="gesture-icon">🤏</span> <span>Pinch</span></div>
            <select id="map-pinch">
                <option value="PLAY_PAUSE" selected>Play / Pause Media</option>
                <option value="NEXT_TRACK">Next Track</option>
                <option value="PREV_TRACK">Previous Track</option>
                <option value="VOLUME_UP">Volume Up</option>
                <option value="VOLUME_DOWN">Volume Down</option>
                <option value="MUTE_TOGGLE">Mute Volume</option>
                <option value="MIC_MUTE">Mic Mute Toggle</option>
                <option value="MISSION_CONTROL">Mission Control</option>
                <option value="LAUNCHPAD">Launchpad</option>
                <option value="SHOW_DESKTOP">Show Desktop</option>
                <option value="BRIGHTNESS_UP">Brightness Up</option>
                <option value="BRIGHTNESS_DOWN">Brightness Down</option>
                <option value="LOCK_SCREEN">Lock Screen</option>
                <option value="LAUNCH_SAFARI">Open Safari</option>
                <option value="LAUNCH_CHROME">Open Chrome</option>
                <option value="LAUNCH_SPOTIFY">Open Spotify</option>
                <option value="LAUNCH_VSCODE">Open VS Code</option>
                <option value="LAUNCH_TERMINAL">Open Terminal</option>
                <option value="NONE">Disabled</option>
            </select>
        </div>

        <div class="gesture-row">
            <div class="gesture-label"><span class="gesture-icon">✊</span> <span>Fist</span></div>
            <select id="map-fist">
                <option value="PLAY_PAUSE">Play / Pause Media</option>
                <option value="NEXT_TRACK">Next Track</option>
                <option value="PREV_TRACK">Previous Track</option>
                <option value="VOLUME_UP">Volume Up</option>
                <option value="VOLUME_DOWN">Volume Down</option>
                <option value="MUTE_TOGGLE" selected>Mute Volume</option>
                <option value="MIC_MUTE">Mic Mute Toggle</option>
                <option value="MISSION_CONTROL">Mission Control</option>
                <option value="LAUNCHPAD">Launchpad</option>
                <option value="SHOW_DESKTOP">Show Desktop</option>
                <option value="BRIGHTNESS_UP">Brightness Up</option>
                <option value="BRIGHTNESS_DOWN">Brightness Down</option>
                <option value="LOCK_SCREEN">Lock Screen</option>
                <option value="LAUNCH_SAFARI">Open Safari</option>
                <option value="LAUNCH_CHROME">Open Chrome</option>
                <option value="LAUNCH_SPOTIFY">Open Spotify</option>
                <option value="LAUNCH_VSCODE">Open VS Code</option>
                <option value="LAUNCH_TERMINAL">Open Terminal</option>
                <option value="NONE">Disabled</option>
            </select>
        </div>

        <div class="gesture-row">
            <div class="gesture-label"><span class="gesture-icon">✋</span> <span>Open Palm</span></div>
            <select id="map-palm">
                <option value="PLAY_PAUSE">Play / Pause Media</option>
                <option value="NEXT_TRACK">Next Track</option>
                <option value="PREV_TRACK">Previous Track</option>
                <option value="VOLUME_UP">Volume Up</option>
                <option value="VOLUME_DOWN">Volume Down</option>
                <option value="MUTE_TOGGLE">Mute Volume</option>
                <option value="MIC_MUTE">Mic Mute Toggle</option>
                <option value="MISSION_CONTROL" selected>Mission Control</option>
                <option value="LAUNCHPAD">Launchpad</option>
                <option value="SHOW_DESKTOP">Show Desktop</option>
                <option value="BRIGHTNESS_UP">Brightness Up</option>
                <option value="BRIGHTNESS_DOWN">Brightness Down</option>
                <option value="LOCK_SCREEN">Lock Screen</option>
                <option value="LAUNCH_SAFARI">Open Safari</option>
                <option value="LAUNCH_CHROME">Open Chrome</option>
                <option value="LAUNCH_SPOTIFY">Open Spotify</option>
                <option value="LAUNCH_VSCODE">Open VS Code</option>
                <option value="LAUNCH_TERMINAL">Open Terminal</option>
                <option value="NONE">Disabled</option>
            </select>
        </div>

        <div class="gesture-row">
            <div class="gesture-label"><span class="gesture-icon">↔️</span> <span>Swipes</span></div>
            <select id="map-swipe">
                <option value="SPACES" selected>Switch Desktop Spaces</option>
                <option value="PLAY_PAUSE">Play / Pause Media</option>
                <option value="NEXT_TRACK">Next Track</option>
                <option value="PREV_TRACK">Previous Track</option>
                <option value="VOLUME_UP">Volume Up</option>
                <option value="VOLUME_DOWN">Volume Down</option>
                <option value="MUTE_TOGGLE">Mute Volume</option>
                <option value="MIC_MUTE">Mic Mute Toggle</option>
                <option value="MISSION_CONTROL">Mission Control</option>
                <option value="LAUNCHPAD">Launchpad</option>
                <option value="SHOW_DESKTOP">Show Desktop</option>
                <option value="BRIGHTNESS_UP">Brightness Up</option>
                <option value="BRIGHTNESS_DOWN">Brightness Down</option>
                <option value="LOCK_SCREEN">Lock Screen</option>
                <option value="LAUNCH_SAFARI">Open Safari</option>
                <option value="LAUNCH_CHROME">Open Chrome</option>
                <option value="LAUNCH_SPOTIFY">Open Spotify</option>
                <option value="LAUNCH_VSCODE">Open VS Code</option>
                <option value="LAUNCH_TERMINAL">Open Terminal</option>
                <option value="NONE">Disabled</option>
            </select>
        </div>

        <h2 style="margin-top: 30px;">Engine Settings</h2>
        
        <div class="setting-group">
            <label>Tracking Smoothing</label>
            <input type="range" id="setting-smoothing" min="0.1" max="1.0" step="0.1" value="0.5">
        </div>

        <div class="setting-group">
            <label>Detection Sensitivity</label>
            <input type="range" id="setting-sensitivity" min="0.5" max="0.95" step="0.05" value="0.8">
        </div>

        <div class="setting-group" style="display: flex; gap: 20px;">
            <label style="flex: 1;">
                <input type="checkbox" id="setting-autolaunch"> Launch at Login
            </label>
            <label style="flex: 1;">
                <input type="checkbox" id="setting-hand-preference"> Left Hand Mode
            </label>
        </div>

        <h2 style="margin-top: 30px;">Visual Theme</h2>
        <div class="setting-group">
            <select id="setting-theme">
                <option value="cyberpunk" selected>Cyberpunk Carbon</option>
                <option value="minimal">Minimalist Snow</option>
                <option value="emerald">Emerald Matrix</option>
            </select>
        </div>

        <h2 style="margin-top: 30px;">Activation Control</h2>
        <div class="setting-group">
            <label>
                <input type="checkbox" id="setting-require-key"> Only track when key is held
            </label>
        </div>
        <div class="setting-group" id="group-activation-key" style="opacity: 0.5; pointer-events: none; transition: all 0.3s;">
            <label>Select Activation Key</label>
            <select id="setting-activation-key">
                <option value="Command">Command (⌘)</option>
                <option value="Option" selected>Option (⌥)</option>
                <option value="Control">Control (⌃)</option>
            </select>
        </div>

    </div>

    <script src="../../dist/renderer/renderer.js"></script>
</body>
</html>
